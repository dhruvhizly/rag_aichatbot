<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RAG Chatbot Demo</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f242d;
    --border: #2a313d;
    --text: #e6e8eb;
    --muted: #8a93a3;
    --accent: #6aa9ff;
    --user: #2a3a55;
    --bot: #1f242d;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel);
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .spacer { flex: 1; }
  header label { font-size: 13px; color: var(--muted); }
  header input[type=text] {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    width: 180px;
  }
  header button {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  header button:hover { border-color: var(--accent); }

  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  aside {
    width: 280px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }
  aside h2 { font-size: 13px; color: var(--muted); margin: 0; text-transform: uppercase; letter-spacing: 0.5px; }
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }
  .upload-zone:hover { border-color: var(--accent); color: var(--text); }
  .upload-zone input { display: none; }
  .status {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .status.error { color: var(--danger); }

  #chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 760px;
    padding: 10px 14px;
    border-radius: 10px;
    white-space: pre-wrap;
    line-height: 1.5;
    font-size: 14px;
  }
  .msg.user { background: var(--user); align-self: flex-end; }
  .msg.assistant { background: var(--bot); align-self: flex-start; border: 1px solid var(--border); }
  .msg.error { background: #3a1f23; color: var(--danger); align-self: flex-start; }
  .msg .label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  form#composer {
    display: flex;
    gap: 8px;
    padding: 16px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  #composer textarea {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 42px;
    max-height: 160px;
  }
  #composer button {
    background: var(--accent);
    color: #0b1320;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
  }
  #composer button:disabled { opacity: 0.5; cursor: not-allowed; }

  .dots {
    display: inline-flex;
    gap: 4px;
    padding: 4px 2px;
  }
  .dots span {
    width: 6px;
    height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: dot-bounce 1.2s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%           { transform: translateY(-4px); opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <h1>RAG Chatbot Demo</h1>
  <div class="spacer"></div>
  <label for="sessionInput">Session</label>
  <input id="sessionInput" type="text" value="default" />
  <button id="clearBtn" type="button">Clear session</button>
</header>

<main>
  <aside>
    <h2>Upload document</h2>
    <label class="upload-zone" id="dropZone">
      <input id="fileInput" type="file" accept=".pdf,.txt" />
      <span id="dropLabel">Click to choose a PDF or TXT</span>
    </label>
    <div id="uploadStatus" class="status"></div>
    <h2 style="margin-top:8px">Tips</h2>
    <div class="status">
      Upload a document, then ask questions about it. The bot answers strictly from indexed content.
      Use the same Session ID to keep context across turns.
    </div>
  </aside>

  <section id="chat">
    <div id="messages"></div>
    <form id="composer">
      <textarea id="input" placeholder="Ask about your document..." autocomplete="off"></textarea>
      <button id="sendBtn" type="submit">Send</button>
    </form>
  </section>
</main>

<script>
const API_BASE = "/api";
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const sessionEl = document.getElementById("sessionInput");
const fileInput = document.getElementById("fileInput");
const dropLabel = document.getElementById("dropLabel");
const uploadStatus = document.getElementById("uploadStatus");
const clearBtn = document.getElementById("clearBtn");

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  const label = document.createElement("span");
  label.className = "label";
  label.textContent = role;
  const body = document.createElement("span");
  body.textContent = text;
  div.appendChild(label);
  div.appendChild(body);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return body;
}

function addLoader(bubble) {
  const dots = document.createElement("span");
  dots.className = "dots";
  dots.innerHTML = "<span></span><span></span><span></span>";
  bubble.appendChild(dots);
  return dots;
}

function setStatus(el, msg, isError) {
  el.textContent = msg;
  el.className = "status" + (isError ? " error" : "");
}

fileInput.addEventListener("change", async () => {
  const file = fileInput.files[0];
  if (!file) return;
  dropLabel.textContent = file.name;
  setStatus(uploadStatus, "Uploading and indexing...", false);

  const form = new FormData();
  form.append("session_id", sessionEl.value || "default");
  form.append("file", file);

  try {
    const res = await fetch(API_BASE + "/upload", { method: "POST", body: form });
    const data = await res.json();
    if (!res.ok) {
      setStatus(uploadStatus, "Upload failed: " + (data.detail || res.statusText), true);
      return;
    }
    setStatus(uploadStatus,
      `Indexed ${data.chunks_indexed} chunks from "${data.filename}" (session: ${data.session_id})`, false);
  } catch (err) {
    setStatus(uploadStatus, "Upload error: " + err.message, true);
  }
});

clearBtn.addEventListener("click", async () => {
  const sid = sessionEl.value || "default";
  try {
    await fetch(API_BASE + "/chat/" + encodeURIComponent(sid), { method: "DELETE" });
  } catch {}
  messagesEl.innerHTML = "";
  setStatus(uploadStatus, "Session cleared.", false);
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    document.getElementById("composer").requestSubmit();
  }
});

document.getElementById("composer").addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = "";
  sendBtn.disabled = true;

  addMessage("user", text);
  const botBody = addMessage("assistant", "");
  const loader = addLoader(botBody.parentElement);
  let loaderActive = true;
  const stopLoader = () => {
    if (loaderActive) {
      loader.remove();
      loaderActive = false;
    }
  };

  try {
    const res = await fetch(API_BASE + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, session_id: sessionEl.value || "default" }),
    });
    if (!res.ok || !res.body) {
      stopLoader();
      botBody.parentElement.classList.add("error");
      botBody.textContent = "Request failed: " + res.status + " " + res.statusText;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let gotError = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      let sep;
      while ((sep = buffer.indexOf("\n\n")) !== -1) {
        const rawEvent = buffer.slice(0, sep);
        buffer = buffer.slice(sep + 2);
        if (!rawEvent.trim()) continue;

        const lines = rawEvent.split("\n");
        let eventType = "message";
        const dataLines = [];
        for (const line of lines) {
          if (line.startsWith("event:")) eventType = line.slice(6).trim();
          else if (line.startsWith("data:")) dataLines.push(line.slice(5).replace(/^ /, ""));
        }
        const data = dataLines.join("\n");
        if (eventType === "error") {
          stopLoader();
          gotError = true;
          botBody.parentElement.classList.add("error");
          botBody.textContent = "Stream error: " + data;
          continue;
        }
        if (data === "[DONE]") continue;
        if (!gotError) {
          stopLoader();
          botBody.textContent += data;
        }
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }
  } catch (err) {
    stopLoader();
    botBody.parentElement.classList.add("error");
    botBody.textContent = "Network error: " + err.message;
  } finally {
    stopLoader();
    sendBtn.disabled = false;
    inputEl.focus();
  }
});

inputEl.focus();
</script>
</body>
</html>
